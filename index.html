<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennis Snellenberg — Freelance Designer & Developer</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/layout.css">
    <link rel="stylesheet" href="src/styles/components.css">
    <link rel="stylesheet" href="src/styles/animations.css">
</head>
<body data-barba="wrapper">
    <!-- Custom Cursor -->
    <div class="custom-cursor">
        <div class="cursor-follower"></div>
        <div class="cursor-view">View</div>
    </div>

    <!-- Preloader -->
    <div class="loading-container">
        <div class="loading-screen">
            <div class="rounded-div-wrap top"></div>
            <div class="loading-words">
                <h2 class="home-active">Hello</h2>
                <h2 class="home-active">Bonjour</h2>
                <h2 class="home-active">Ciao</h2>
                <h2 class="home-active">Hallo</h2>
            </div>
            <div class="rounded-div-wrap bottom"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <div class="nav-logo">
            <a href="/" class="magnetic">© Code by Dennis</a>
        </div>
        <div class="nav-links">
            <a href="/work" class="magnetic">Work</a>
            <a href="/about" class="magnetic">About</a>
            <a href="/contact" class="magnetic">Contact</a>
            <div class="menu-toggle magnetic">
                <div class="burger"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main data-barba="container" data-barba-namespace="home" data-scroll-container>
        <section class="home-header" data-scroll-section>
            <div class="hero-bg" style="background-image: url('assets/img/hero_bg.jpg');"></div>
            <div class="hero-content">
                <h1 class="name-h1" data-scroll data-scroll-speed="4" data-scroll-direction="horizontal">
                    Dennis Snellenberg —
                </h1>
            </div>
        </section>

        <section class="home-about" data-scroll-section>
            <div class="container">
                <div class="about-flex">
                    <div class="about-text">
                        <p class="reveal-text">Helping brands to stand out in the digital age. Together we will set the new status quo.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Content injected by JS -->
        <section class="work-grid" data-scroll-section id="work"></section>

        <footer class="footer" data-scroll-section></footer>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
