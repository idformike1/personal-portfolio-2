<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Dennis Snellenberg</title>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/styles/layout.css">
    <link rel="stylesheet" href="/src/styles/components.css">
    <link rel="stylesheet" href="/src/styles/animations.css">
</head>
<body data-barba="wrapper">
    <div class="custom-cursor">
        <div class="cursor-follower"></div>
        <div class="cursor-view">PREVIEW</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-logo">
            <a href="/" class="magnetic">© Code by Dennis</a>
        </div>
        <div class="nav-links">
            <a href="/work" class="magnetic">Work</a>
            <a href="/about" class="magnetic">About</a>
            <a href="/contact" class="magnetic">Contact</a>
            <div class="menu-toggle magnetic">
                <div class="burger"></div>
            </div>
        </div>
    </nav>

    <div data-scroll-container>
        <main data-barba="container" data-barba-namespace="about">
            <section class="about-header" style="padding: 15rem 4vw 5rem;">
                <h1 style="font-size: clamp(4rem, 10vw, 8rem); margin-bottom: 2rem;">About</h1>
                <p style="opacity: 0.6; font-size: 1.2rem;">Helping brands to stand out in the digital age.</p>
            </section>
            
            <section class="about-content" style="padding: 5rem 4vw;">
                <p style="font-size: 2rem; max-width: 800px;">I help brands with a passion to stand out in the digital age. Together we will set the new status quo.</p>
            </section>
            
            <footer class="footer"></footer>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
